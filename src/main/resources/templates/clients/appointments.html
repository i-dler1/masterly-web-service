<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Мои записи - Masterly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }

        .header {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav {
            background: #333;
            overflow: hidden;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .nav a {
            float: left;
            color: white;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
        }

        .nav a:hover {
            background-color: #ddd;
            color: black;
        }

        .content {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .logout-form button {
            padding: 8px 16px;
            background-color: #dc3545;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .table th, .table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        .table th {
            background-color: #f8f9fa;
        }

        .badge {
            padding: 5px 10px;
            border-radius: 4px;
            color: white;
            display: inline-block;
        }

        .bg-success {
            background-color: #28a745;
        }

        .bg-danger {
            background-color: #dc3545;
        }

        .bg-warning {
            background-color: #ffc107;
            color: black;
        }

        .bg-secondary {
            background-color: #6c757d;
        }

        .btn-sm {
            padding: 4px 8px;
            border-radius: 4px;
            text-decoration: none;
            display: inline-block;
            margin-right: 5px;
        }

        .btn-cancel {
            background-color: #dc3545;
            color: white;
            border: none;
            cursor: pointer;
        }

        .table-secondary {
            background-color: #e9ecef !important;
            opacity: 0.8;
        }

        .alert {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
        }

        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; background-color: #218838; }
            100% { transform: scale(1); opacity: 1; }
        }

        .animate-pulse {
            animation: pulse 1s ease-in-out 3;
        }
    </style>
</head>
<body>
<div class="header">
    <h1>Masterly - Кабинет клиента</h1>
    <form th:action="@{/logout}" method="post" class="logout-form">
        <button type="submit">Выйти</button>
    </form>
</div>

<div class="nav">
    <a href="/client/dashboard">Главная</a>
    <a href="/client/masters">Мастера</a>
    <a href="/client/appointments">Мои записи</a>
    <a href="/client/profile">Мой профиль</a>
</div>

<div class="content">
    <h2>Мои записи</h2>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div th:if="${appointments == null or appointments.empty}" class="alert alert-info">
        У вас пока нет записей. <a href="/client/masters">Записаться к мастеру</a>
    </div>

    <div th:unless="${appointments == null or appointments.empty}">
        <table class="table">
            <thead>
            <tr>
                <th>Дата</th>
                <th>Время</th>
                <th>Услуга</th>
                <th>Мастер</th>
                <th>Статус</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="app : ${appointments}"
                th:class="${app.appointmentDate.isBefore(today)} ? 'table-secondary' : ''">
                <td>
                    <span th:text="${#temporals.format(app.appointmentDate, 'dd.MM.yyyy')}"></span>
                    <span th:if="${app.id == newAppointmentId}" class="badge bg-success ms-2 animate-pulse">🆕 NEW</span>
                </td>
                <td th:text="${app.startTime} + ' - ' + ${app.endTime}">-</td>
                <td th:text="${app.serviceName}">-</td>
                <td th:text="${app.masterName}">-</td>
                <td>
                    <span th:if="${app.appointmentDate.isBefore(today)}" class="badge bg-secondary">Прошла</span>
                    <span th:unless="${app.appointmentDate.isBefore(today)}" class="badge"
                          th:class="${app.status == 'CONFIRMED' ? 'bg-success' :
                                        (app.status == 'CANCELLED' ? 'bg-danger' : 'bg-warning')}"
                          th:text="${app.status == 'PENDING' ? 'Ожидает' :
                                       (app.status == 'CONFIRMED' ? 'Подтверждена' :
                                       (app.status == 'CANCELLED' ? 'Отменена' : app.status))}">
                        </span>
                </td>
                <td>
                    <form th:if="${app.status == 'PENDING' and !app.appointmentDate.isBefore(today)}"
                          th:action="@{/client/appointments/{id}/cancel(id=${app.id})}"
                          method="post" style="display:inline;">
                        <button type="submit" class="btn-sm btn-cancel" style="border: none; cursor: pointer;">Отменить</button>
                    </form>
                    <span th:if="${app.appointmentDate.isBefore(today)}" style="color: gray;">🔒 Завершена</span>
                </td>
            </tr>
            </tbody>
        </table>
        <div th:if="${totalPages > 1}" class="pagination">
            <a th:href="@{/client/appointments(page=0, size=${size})}" th:if="${currentPage > 0}" class="page-link">«</a>
            <a th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
               th:href="@{/client/appointments(page=${i}, size=${size})}"
               th:text="${i + 1}"
               th:class="'page-link ' + (${i == currentPage} ? 'active' : '')"></a>
            <a th:href="@{/client/appointments(page=${currentPage + 1}, size=${size})}"
               th:if="${currentPage + 1 < totalPages}" class="page-link">»</a>
        </div>

        <div class="page-size-selector">
            <label>Показывать на странице:</label>
            <select onchange="window.location.href='/client/appointments?page=0&size=' + this.value">
                <option th:selected="${size == 5}" value="5">5</option>
                <option th:selected="${size == 10}" value="10">10</option>
                <option th:selected="${size == 20}" value="20">20</option>
                <option th:selected="${size == 50}" value="50">50</option>
            </select>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
