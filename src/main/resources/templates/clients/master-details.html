<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Профиль мастера - Masterly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f4f4; }
        .header { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .nav { background: #333; overflow: hidden; border-radius: 8px; margin-bottom: 20px; }
        .nav a { float: left; color: white; text-align: center; padding: 14px 16px; text-decoration: none; }
        .nav a:hover { background-color: #ddd; color: black; }
        .content { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logout-form button { padding: 8px 16px; background-color: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .service-item { border-bottom: 1px solid #eee; padding: 15px 0; display: flex; justify-content: space-between; align-items: center; }
        .service-item:last-child { border-bottom: none; }
        .service-info { flex-grow: 1; }
        .btn-book { background-color: #28a745; color: white; padding: 8px 20px; border-radius: 4px; text-decoration: none; display: inline-block; }
        .btn-book:hover { background-color: #218838; color: white; }
        .btn-back { background-color: #6c757d; color: white; padding: 8px 16px; border-radius: 4px; text-decoration: none; display: inline-block; margin-top: 20px; }
        .btn-back:hover { background-color: #5a626d; color: white; }
        .master-info { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
<div class="header">
    <h1>Masterly - Кабинет клиента</h1>
    <form th:action="@{/logout}" method="post" class="logout-form">
        <button type="submit">Выйти</button>
    </form>
</div>

<div class="nav">
    <a href="/client/dashboard">Главная</a>
    <a href="/client/masters">Мастера</a>
    <a href="/client/appointments">Мои записи</a>
    <a href="/client/profile">Мой профиль</a>
</div>

<div class="content">
    <h2>Профиль мастера</h2>

    <div class="master-info">
        <h3 th:text="${master.fullName}">Имя мастера</h3>
        <p><strong>Специализация:</strong> <span th:text="${master.specialization != null ? master.specialization : 'Не указана'}"></span></p>
        <p><strong>Телефон:</strong> <span th:text="${master.phone != null ? master.phone : 'Не указан'}"></span></p>
        <p><strong>Email:</strong> <span th:text="${master.email}"></span></p>
    </div>

    <h3>Услуги мастера</h3>

    <div th:if="${services == null or services.empty}" class="alert alert-info">
        У этого мастера пока нет услуг
    </div>

    <div th:each="service : ${services}" class="service-item">
        <div class="service-info">
            <strong th:text="${service.name}">Название услуги</strong><br>
            <span>Стоимость: <span th:text="${service.price}"></span> руб.</span><br>
            <span>Длительность: <span th:text="${service.durationMinutes}"></span> мин.</span>
        </div>
        <a th:href="@{/client/masters/{masterId}/book/{serviceId}/calendar(masterId=${master.id}, serviceId=${service.id})}"
           class="btn-book">Записаться</a>
    </div>

    <a th:href="@{/client/masters}" class="btn-back">← Назад к мастерам</a>
</div>
</body>
</html>
