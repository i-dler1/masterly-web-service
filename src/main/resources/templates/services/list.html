<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Услуги - Masterly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f4; }
        .container { background: white; padding: 20px; border-radius: 8px; }
        h1 { color: #333; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f9fa; }
        .pagination { margin-top: 20px; display: flex; justify-content: center; gap: 10px; }
        .pagination a { padding: 8px 12px; text-decoration: none; color: #007bff; border: 1px solid #ddd; border-radius: 4px; }
        .pagination a:hover { background-color: #007bff; color: white; }
        .pagination .active { background-color: #007bff; color: white; border-color: #007bff; }
        .btn { display: inline-block; padding: 8px 16px; background-color: #28a745; color: white; text-decoration: none; border-radius: 4px; margin-bottom: 20px; }
        .nav { background: #333; padding: 10px; margin-bottom: 20px; border-radius: 8px; overflow: hidden; }
        .nav a { float: left; color: white; padding: 10px 15px; text-decoration: none; }
        .nav a:hover { background-color: #ddd; color: black; }
        .logout-btn { float: right; background-color: #dc3545; }
        .logout-btn:hover { background-color: #c82333; }
    </style>
</head>
<body>
<div class="nav">
    <a href="/clients">Клиенты</a>
    <a href="/services">Услуги</a>
    <a href="/materials">Материалы</a>
    <a href="/appointments">Записи</a>
    <a href="/profile">Профиль</a>
    <a href="/logout" class="logout-btn">Выйти</a>
</div>

<div class="container">
    <h1>Услуги</h1>

    <!-- Сообщения об успехе/ошибке -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <a href="/services/new" class="btn">Добавить услугу</a>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Название</th>
            <th>Цена</th>
            <th>Длительность</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="service : ${services}">
            <td th:text="${service.id}">1</td>
            <td th:text="${service.name}">Стрижка</td>
            <td th:text="${service.price}">1000</td>
            <td th:text="${service.durationMinutes}">60</td>
            <td>
                <a th:href="@{/services/edit/{id}(id=${service.id})}">Редактировать</a>
                <a th:href="@{/services/delete/{id}(id=${service.id})}" onclick="return confirm('Удалить услугу?')">Удалить</a>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(services)}">
            <td th:colspan="5" style="text-align: center;">Нет услуг</td>
        </tr>
        </tbody>
    </table>

    <div class="pagination">
        <a th:if="${currentPage > 0}" th:href="@{/services(page=${currentPage - 1}, size=${size})}">« Предыдущая</a>
        <a th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
           th:class="${i == currentPage} ? 'active' : ''"
           th:href="@{/services(page=${i}, size=${size})}"
           th:text="${i + 1}">1</a>
        <a th:if="${currentPage + 1 < totalPages}" th:href="@{/services(page=${currentPage + 1}, size=${size})}">Следующая »</a>
    </div>

    <div style="margin-top: 20px;">
        <label>Показывать на странице:</label>
        <select onchange="window.location.href=this.value">
            <option th:selected="${size == 5}" th:value="@{/services(page=0, size=5)}">5</option>
            <option th:selected="${size == 10}" th:value="@{/services(page=0, size=10)}">10</option>
            <option th:selected="${size == 20}" th:value="@{/services(page=0, size=20)}">20</option>
            <option th:selected="${size == 50}" th:value="@{/services(page=0, size=50)}">50</option>
        </select>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
