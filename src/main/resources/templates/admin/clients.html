<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Мои клиенты - Masterly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f4f4; }
        .header { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .nav { background: #333; overflow: hidden; border-radius: 8px; margin-bottom: 20px; }
        .nav a { float: left; color: white; text-align: center; padding: 14px 16px; text-decoration: none; }
        .nav a:hover { background-color: #ddd; color: black; }
        .content { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logout-form button { padding: 8px 16px; background-color: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .btn-add { background-color: #28a745; color: white; padding: 8px 16px; border-radius: 4px; text-decoration: none; display: inline-block; margin-bottom: 15px; }
        .btn-edit { background-color: #ffc107; color: black; padding: 4px 8px; border-radius: 4px; text-decoration: none; margin-right: 5px; }
        .btn-delete { background-color: #dc3545; color: white; padding: 4px 8px; border-radius: 4px; text-decoration: none; }
        .table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .table th, .table td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        .table th { background-color: #f8f9fa; }
        .pagination { margin-top: 20px; }
        .pagination a { padding: 8px 12px; text-decoration: none; border: 1px solid #ddd; margin: 0 2px; }
        .pagination .active { background-color: #007bff; color: white; border: 1px solid #007bff; }
        .search-box { margin-bottom: 20px; display: flex; gap: 10px; }
        .search-box input { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .search-box button { padding: 8px 16px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
<div class="header">
    <h1>Masterly</h1>
    <form th:action="@{/logout}" method="post" class="logout-form">
        <button type="submit">Выйти</button>
    </form>
</div>

<div class="nav">
    <a href="/admin/dashboard">Главная</a>
    <a href="/admin/services">Услуги</a>
    <a href="/admin/materials">Материалы</a>
    <a href="/admin/clients">Клиенты</a>
    <a href="/admin/appointments">Записи</a>
    <a href="/admin/masters">Мастера</a>
    <a href="/admin/profile">Профиль</a>
</div>

<div class="content">
    <h2>Все клиенты</h2>
    <a href="#" class="btn-add">+ Добавить клиента</a>

    <div class="search-box">
        <input type="text" placeholder="Поиск по имени, email или телефону..." id="searchInput">
        <button onclick="search()">Поиск</button>
    </div>

    <div th:if="${clients == null or clients.empty}" class="alert alert-info">
        У вас пока нет клиентов. Добавьте первого клиента!
    </div>

    <div th:unless="${clients.empty}">
        <table class="table">
            <thead>
            <tr>
                <th>Имя</th>
                <th>Телефон</th>
                <th>Email</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="client : ${clients}">
                <td th:text="${client.fullName}">-</td>
                <td th:text="${client.phone}">-</td>
                <td th:text="${client.email != null ? client.email : '-'}">-</td>
                <td>
                    <a th:href="@{/admin/clients/edit/{id}(id=${client.id})}" class="btn-edit">Редактировать</a>
                    <a th:href="@{/admin/clients/delete/{id}(id=${client.id})}"
                       class="btn-delete"
                       onclick="return confirm('Удалить клиента?')">Удалить</a>
                </td>
            </tr>
            </tbody>
        </table>

        <!-- Пагинация -->
        <div class="pagination" th:if="${totalPages > 1}">
            <a th:href="@{/admin/clients(page=0, size=${size})}" th:if="${currentPage > 0}">«</a>
            <a th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
               th:href="@{/admin/clients(page=${i}, size=${size})}"
               th:text="${i+1}"
               th:class="${i == currentPage} ? 'active' : ''"></a>
            <a th:href="@{/admin/clients(page=${currentPage+1}, size=${size})}" th:if="${currentPage < totalPages - 1}">»</a>
        </div>
    </div>
</div>

<script>
    function search() {
        const query = document.getElementById('searchInput').value;
        window.location.href = `/admin/clients?search=${encodeURIComponent(query)}`;
    }
</script>
</body>
</html>
