<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Мастера - Админ панель</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f4f4; }
        .header { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .nav { background: #333; overflow: hidden; border-radius: 8px; margin-bottom: 20px; }
        .nav a { float: left; color: white; text-align: center; padding: 14px 16px; text-decoration: none; }
        .nav a:hover { background-color: #ddd; color: black; }
        .content { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logout-form button { padding: 8px 16px; background-color: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .table th, .table td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        .table th { background-color: #f8f9fa; }
        /*.badge-active { background-color: #28a745; color: white; padding: 4px 8px; border-radius: 4px; }*/
        /*.badge-inactive { background-color: #dc3545; color: white; padding: 4px 8px; border-radius: 4px; }*/
    </style>
</head>
<body>
<div class="header">
    <h1>Masterly - Админ панель</h1>
    <form th:action="@{/logout}" method="post" class="logout-form">
        <button type="submit">Выйти</button>
    </form>
</div>

<div class="nav">
    <a href="/admin/dashboard">Главная</a>
    <a href="/admin/services">Услуги</a>
    <a href="/admin/materials">Материалы</a>
    <a href="/admin/clients">Клиенты</a>
    <a href="/admin/appointments">Записи</a>
    <a href="/admin/masters">Мастера</a>
    <a href="/admin/profile">Профиль</a>
</div>

<div class="content">
    <h2>Все мастера</h2>

    <div th:if="${masters == null or masters.empty}" class="alert alert-info">
        Нет мастеров
    </div>

    <div th:unless="${masters == null or masters.empty}">
        <table class="table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Имя</th>
                <th>Email</th>
                <th>Телефон</th>
                <th>Специализация</th>
                <th>Статус</th>
                <th>Действия</th>
            </thead>
            <tbody>
            <tr th:each="master : ${masters}">
                <td th:text="${master.id}">-</td>
                <td th:text="${master.fullName}">-</td>
                <td th:text="${master.email}">-</td>
                <td th:text="${master.phone != null ? master.phone : '-'}">-</td>
                <td th:text="${master.specialization != null ? master.specialization : '-'}">-</td>
                <td>
                        <span th:class="${master.isActive ? 'badge-active' : 'badge-inactive'}"
                              th:text="${master.isActive ? 'Активен' : 'Заблокирован'}">
                        </span>
                </td>
                <td>
                    <a th:href="@{/admin/masters/{id}/toggle-status(id=${master.id})}"
                       class="btn btn-sm btn-warning"
                       th:text="${master.isActive ? 'Заблокировать' : 'Активировать'}">
                    </a>
                    <a th:href="@{/admin/masters/delete/{id}(id=${master.id})}"
                       class="btn btn-sm btn-danger"
                       onclick="return confirm('Удалить мастера?')">
                        Удалить
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
