<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Мои записи - Masterly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }

        .header {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav {
            background: #333;
            overflow: hidden;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .nav a {
            float: left;
            color: white;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
        }

        .nav a:hover {
            background-color: #ddd;
            color: black;
        }

        .content {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .logout-form button {
            padding: 8px 16px;
            background-color: #dc3545;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        /*.badge { padding: 5px 10px; border-radius: 4px; color: white; display: inline-block; }*/
        /*.bg-success { background-color: #28a745; }*/
        /*.bg-danger { background-color: #dc3545; }*/
        /*.bg-warning { background-color: #ffc107; color: black; }*/
        /*.bg-secondary { background-color: #6c757d; }*/
        .btn-confirm {
            background-color: #28a745;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            text-decoration: none;
            margin-right: 5px;
        }

        .btn-complete {
            background-color: #17a2b8;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            text-decoration: none;
            margin-right: 5px;
        }

        .btn-cancel {
            background-color: #dc3545;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            text-decoration: none;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .table th, .table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        .table th {
            background-color: #f8f9fa;
        }

        .pagination {
            margin-top: 20px;
        }

        .pagination a {
            padding: 8px 12px;
            text-decoration: none;
            border: 1px solid #ddd;
            margin: 0 2px;
        }

        .pagination .active {
            background-color: #007bff;
            color: white;
            border: 1px solid #007bff;
        }
    </style>
</head>
<body>
<div class="header">
    <h1>Masterly</h1>
    <form th:action="@{/logout}" method="post" class="logout-form">
        <button type="submit">Выйти</button>
    </form>
</div>

<div class="nav">
    <a href="/admin/dashboard">Главная</a>
    <a href="/admin/services">Услуги</a>
    <a href="/admin/materials">Материалы</a>
    <a href="/admin/clients">Клиенты</a>
    <a href="/admin/appointments">Записи</a>
    <a href="/admin/masters">Мастера</a>
    <a href="/admin/profile">Профиль</a>
</div>

<div class="content">
    <h2>Мои записи</h2>

    <div th:if="${appointments.empty}" class="alert alert-info">
        У вас пока нет записей.
    </div>

    <div th:unless="${appointments.empty}">
        <table class="table">
            <thead>
            <tr>
                <th>Дата</th>
                <th>Время</th>
                <th>Клиент</th>
                <th>Услуга</th>
                <th>Статус</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="app : ${appointments}">
                <td th:text="${app.appointmentDate}">-</td>
                <td th:text="${app.startTime} + ' - ' + ${app.endTime}">-</td>
                <td th:text="${app.clientName}">-</td>
                <td th:text="${app.serviceName}">-</td>

                <!-- Колонка статуса -->
                <td>
        <span class="badge"
              th:class="${app.status == 'CONFIRMED' ? 'bg-success' :
                        (app.status == 'CANCELLED' ? 'bg-danger' :
                        (app.status == 'COMPLETED' ? 'bg-secondary' : 'bg-warning'))}"
              th:text="${app.status == 'PENDING' ? 'Ожидает' :
                       (app.status == 'CONFIRMED' ? 'Подтверждена' :
                       (app.status == 'COMPLETED' ? 'Выполнена' :
                       (app.status == 'CANCELLED' ? 'Отменена' : app.status)))}">
        </span>
                </td>

                <!-- Колонка действий -->
                <td>
                    <form th:if="${app.status == 'PENDING'}"
                          th:action="@{/admin/appointments/{id}/confirm(id=${app.id})}"
                          method="post" style="display:inline;">
                        <button type="submit" class="btn-confirm">Подтвердить</button>
                    </form>
                    <form th:if="${app.status == 'CONFIRMED'}"
                          th:action="@{/admin/appointments/{id}/complete(id=${app.id})}"
                          method="post" style="display:inline;">
                        <button type="submit" class="btn-complete">Выполнить</button>
                    </form>
                    <form th:if="${app.status == 'PENDING' or app.status == 'CONFIRMED'}"
                          th:action="@{/admin/appointments/{id}/cancel(id=${app.id})}"
                          method="post" style="display:inline;">
                        <button type="submit" class="btn-cancel">Отменить</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>

        <!-- Пагинация -->
        <div class="pagination">
            <a th:if="${currentPage > 0}" th:href="@{/admin/appointments(page=${currentPage - 1})}">« Предыдущая</a>
            <span>Страница <span th:text="${currentPage + 1}"></span> из <span th:text="${totalPages}"></span></span>
            <a th:if="${currentPage + 1 < totalPages}" th:href="@{/admin/appointments(page=${currentPage + 1})}">Следующая
                »</a>
        </div>
    </div>
</div>
</body>
</html>
