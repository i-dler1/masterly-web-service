<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Запись - Masterly</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f4; }
        .container { background: white; padding: 20px; border-radius: 8px; max-width: 500px; margin: 0 auto; }
        h1 { color: #333; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        select, input, textarea { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { margin-top: 20px; padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        .error { color: red; font-size: 12px; margin-top: 5px; display: none; }
        .error.visible { display: block; }
        .field-error { border-color: red; }
        .field-valid { border-color: green; }
        .nav { background: #333; padding: 10px; margin-bottom: 20px; border-radius: 8px; }
        .nav a { color: white; padding: 10px 15px; text-decoration: none; }
        .nav a:hover { background-color: #ddd; color: black; }
    </style>
</head>
<body>
<div class="nav">
    <a href="/clients">Клиенты</a>
    <a href="/services">Услуги</a>
    <a href="/materials">Материалы</a>
    <a href="/appointments">Записи</a>
    <a href="/profile">Профиль</a>
    <a href="/logout">Выйти</a>
</div>

<div class="container">
    <h1 th:text="${appointmentId} ? 'Редактировать запись' : 'Новая запись'">Новая запись</h1>

    <form th:action="@{/appointments/save(id=${appointmentId})}" th:object="${appointment}" method="post" id="appointmentForm">
        <input type="hidden" th:name="id" th:value="${appointmentId}" th:if="${appointmentId}">

        <label for="clientId">Клиент *</label>
        <select th:field="*{clientId}" id="clientId" required>
            <option value="">Выберите клиента</option>
            <option th:each="client : ${clients}" th:value="${client.id}" th:text="${client.fullName}"></option>
        </select>
        <div id="clientError" class="error">Выберите клиента</div>

        <label for="serviceId">Услуга *</label>
        <select th:field="*{serviceId}" id="serviceId" required>
            <option value="">Выберите услугу</option>
            <option th:each="service : ${services}" th:value="${service.id}" th:text="${service.name}"></option>
        </select>
        <div id="serviceError" class="error">Выберите услугу</div>

        <label for="appointmentDate">Дата *</label>
        <input type="date" th:field="*{appointmentDate}" id="appointmentDate" th:min="${today}" required>
        <div id="dateError" class="error">Выберите дату (не может быть в прошлом)</div>

        <label for="startTime">Время *</label>
        <input type="time" th:field="*{startTime}" id="startTime" required>
        <div id="timeError" class="error">Выберите время</div>

        <label for="notes">Примечания</label>
        <textarea th:field="*{notes}" id="notes" rows="3"></textarea>

        <button type="submit">Сохранить</button>
        <a th:href="@{/appointments}" style="margin-left: 10px;">Отмена</a>
    </form>
</div>

<script>
    const clientSelect = document.getElementById('clientId');
    const serviceSelect = document.getElementById('serviceId');
    const dateInput = document.getElementById('appointmentDate');
    const timeInput = document.getElementById('startTime');
    const form = document.getElementById('appointmentForm');

    const clientError = document.getElementById('clientError');
    const serviceError = document.getElementById('serviceError');
    const dateError = document.getElementById('dateError');
    const timeError = document.getElementById('timeError');

    function validateClient() {
        const value = clientSelect.value;
        if (!value || value === '') {
            clientSelect.classList.add('field-error');
            clientSelect.classList.remove('field-valid');
            clientError.classList.add('visible');
            return false;
        } else {
            clientSelect.classList.remove('field-error');
            clientSelect.classList.add('field-valid');
            clientError.classList.remove('visible');
            return true;
        }
    }

    function validateService() {
        const value = serviceSelect.value;
        if (!value || value === '') {
            serviceSelect.classList.add('field-error');
            serviceSelect.classList.remove('field-valid');
            serviceError.classList.add('visible');
            return false;
        } else {
            serviceSelect.classList.remove('field-error');
            serviceSelect.classList.add('field-valid');
            serviceError.classList.remove('visible');
            return true;
        }
    }

    function validateDate() {
        const value = dateInput.value;
        const today = new Date().toISOString().split('T')[0];
        if (!value || value < today) {
            dateInput.classList.add('field-error');
            dateInput.classList.remove('field-valid');
            dateError.classList.add('visible');
            return false;
        } else {
            dateInput.classList.remove('field-error');
            dateInput.classList.add('field-valid');
            dateError.classList.remove('visible');
            return true;
        }
    }

    function validateTime() {
        const value = timeInput.value;
        if (!value) {
            timeInput.classList.add('field-error');
            timeInput.classList.remove('field-valid');
            timeError.classList.add('visible');
            return false;
        } else {
            timeInput.classList.remove('field-error');
            timeInput.classList.add('field-valid');
            timeError.classList.remove('visible');
            return true;
        }
    }

    function validateForm(event) {
        const isClientValid = validateClient();
        const isServiceValid = validateService();
        const isDateValid = validateDate();
        const isTimeValid = validateTime();

        if (!isClientValid || !isServiceValid || !isDateValid || !isTimeValid) {
            event.preventDefault();
            alert('Пожалуйста, заполните все обязательные поля');
            return false;
        }
        return true;
    }

    clientSelect.addEventListener('change', validateClient);
    serviceSelect.addEventListener('change', validateService);
    dateInput.addEventListener('change', validateDate);
    timeInput.addEventListener('change', validateTime);

    form.addEventListener('submit', validateForm);
</script>
</body>
</html>
