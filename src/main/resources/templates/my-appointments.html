<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои записи - Masterly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }

        .header {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav {
            background: #333;
            overflow: hidden;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .nav a {
            float: left;
            color: white;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
        }

        .nav a:hover {
            background-color: #ddd;
            color: black;
        }

        .content {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .logout-form button {
            padding: 8px 16px;
            background-color: #dc3545;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .badge {
            padding: 5px 10px;
            border-radius: 4px;
            color: white;
            display: inline-block;
        }

        .bg-success {
            background-color: #28a745;
        }

        .bg-danger {
            background-color: #dc3545;
        }

        .bg-warning {
            background-color: #ffc107;
            color: black;
        }

        .bg-secondary {
            background-color: #6c757d;
        }

        .bg-info {
            background-color: #17a2b8;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .table th, .table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        .table th {
            background-color: #f8f9fa;
        }

        .btn-back {
            background-color: #6c757d;
            color: white;
            padding: 8px 16px;
            border-radius: 4px;
            text-decoration: none;
            display: inline-block;
        }

        .btn-back:hover {
            background-color: #5a6268;
            color: white;
        }
    </style>
</head>
<body>
<div class="header">
    <h1>Masterly</h1>
    <form th:action="@{/logout}" method="post" class="logout-form">
        <button type="submit">Выйти</button>
    </form>
</div>

<div class="nav">
    <a th:if="${#authorization.expression('hasRole(''ADMIN'')')}" href="/clients">Клиенты</a>
    <a th:if="${#authorization.expression('hasRole(''ADMIN'')')}" href="/services">Услуги</a>
    <a th:if="${#authorization.expression('hasRole(''ADMIN'')')}" href="/materials">Материалы</a>
    <a th:if="${#authorization.expression('hasRole(''ADMIN'')')}" href="/appointments">Записи</a>
    <a th:if="${#authorization.expression('hasRole(''MASTER'')')}" href="/my-appointments">Мои записи</a>
    <a th:if="${#authorization.expression('hasRole(''MASTER'')')}" href="/my-clients">Мои клиенты</a>
    <a th:if="${#authorization.expression('hasRole(''MASTER'')')}" href="/profile">Мой профиль</a>
    <a href="/masters">Мастера</a>
    <a th:if="${#authorization.expression('hasRole(''CLIENT'')')}" href="/my-appointments">Мои записи</a>
    <a th:if="${#authorization.expression('hasRole(''CLIENT'')')}" href="/client/profile">Мой профиль</a>
</div>

<div class="content">
    <h2>Мои записи</h2>

    <div th:if="${appointments == null or appointments.empty}" class="alert alert-info">
        <p>У вас пока нет записей.</p>
        <p>Вы можете записаться к мастеру, перейдя в <a href="/masters">список мастеров</a>.</p>
    </div>

    <div th:unless="${appointments == null or appointments.empty}">
        <table class="table">
            <thead>
            <tr>
                <th>Дата</th>
                <th>Время</th>
                <th>Услуга</th>
                <th>Мастер</th>
                <th>Статус</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="app : ${appointments}">
                <td th:text="${app.appointmentDate}">-</td>
                <td th:text="${app.startTime} + ' - ' + ${app.endTime}">-</td>
                <td th:text="${app.serviceName}">-</td>
                <td th:text="${app.masterId}">-</td>
                <td>
                    <span class="badge"
                        th:class="${app.status == 'CONFIRMED' ? 'bg-success' :
                            (app.status == 'CANCELLED' ? 'bg-danger' :
                            (app.status == 'COMPLETED' ? 'bg-secondary' : 'bg-warning'))}"
                        th:text="${app.status == 'PENDING' ? 'Ожидает подтверждения' :
                             (app.status == 'CONFIRMED' ? 'Подтверждена' :
                             (app.status == 'COMPLETED' ? 'Выполнена' :
                             (app.status == 'CANCELLED' ? 'Отменена' : app.status)))}">
    </span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="mt-3">
        <a href="/" class="btn-back">На главную</a>
        <a href="/masters" class="btn-back" style="margin-left: 10px;">Записаться к мастеру</a>
    </div>
</div>
</body>
</html>
