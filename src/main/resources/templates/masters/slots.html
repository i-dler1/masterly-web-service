<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Слоты времени - Masterly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f4f4; }
        .header { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .nav { background: #333; overflow: hidden; border-radius: 8px; margin-bottom: 20px; }
        .nav a { float: left; color: white; text-align: center; padding: 14px 16px; text-decoration: none; }
        .nav a:hover { background-color: #ddd; color: black; }
        .content { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logout-form button { padding: 8px 16px; background-color: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .table th, .table td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        .table th { background-color: #f8f9fa; }
        .btn-add { background-color: #28a745; color: white; padding: 8px 16px; border-radius: 4px; text-decoration: none; display: inline-block; margin-bottom: 15px; }
        .btn-delete { background-color: #dc3545; color: white; padding: 4px 8px; border-radius: 4px; text-decoration: none; }
        .filter-panel { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap; }
        .filter-group { flex: 1; min-width: 150px; }
        .filter-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .filter-group select, .filter-group input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .btn-filter { background-color: #007bff; color: white; padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; }
        .booked-slot { background-color: #f8d7da; }
        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
        .modal-content { background-color: white; margin: 10% auto; border-radius: 8px; width: 500px; max-width: 90%; }
        .modal-header { padding: 15px 20px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .modal-header h3 { margin: 0; }
        .close { cursor: pointer; font-size: 28px; font-weight: bold; color: #aaa; }
        .close:hover { color: #000; }
        .modal-body { padding: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .btn-submit { background-color: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
<div class="header">
    <h1>Masterly - Кабинет мастера</h1>
    <form th:action="@{/logout}" method="post" class="logout-form">
        <button type="submit">Выйти</button>
    </form>
</div>

<div class="nav">
    <a href="/master/dashboard">Главная</a>
    <a href="/master/clients">Клиенты</a>
    <a href="/master/services">Услуги</a>
    <a href="/master/materials">Материалы</a>
    <a href="/master/appointments">Записи</a>
    <a href="/master/profile">Профиль</a>
</div>

<div class="content">
    <h2>Управление слотами времени</h2>

    <div class="filter-panel">
        <div class="filter-group">
            <label>Услуга:</label>
            <select id="serviceFilter" class="form-control">
                <option value="">Все услуги</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Дата от:</label>
            <input type="date" id="dateFromFilter" class="form-control">
        </div>
        <div class="filter-group">
            <label>Дата до:</label>
            <input type="date" id="dateToFilter" class="form-control">
        </div>
        <div class="filter-group">
            <button class="btn-add" onclick="showAddForm()">+ Добавить слот</button>
        </div>
    </div>

    <div id="slotsList">
        <div class="alert alert-info">Выберите фильтры для просмотра слотов</div>
    </div>
</div>

<!-- Модальное окно для создания слота -->
<div id="slotModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Создать слот времени</h3>
            <span class="close" onclick="closeModal()">&times;</span>
        </div>
        <div class="modal-body">
            <form id="slotForm" onsubmit="createSlot(event)">
                <div class="form-group">
                    <label>Дата:</label>
                    <input type="date" id="slotDate" required>
                </div>
                <div class="form-group">
                    <label>Услуга:</label>
                    <select id="serviceId" required>
                        <option value="">Выберите услугу</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Время начала:</label>
                    <input type="time" id="startTime" required step="900">
                </div>
                <div class="form-group">
                    <label>Время окончания:</label>
                    <input type="time" id="endTime" required step="900">
                </div>
                <button type="submit" class="btn-submit">Создать слот</button>
            </form>
        </div>
    </div>
</div>

<script>
    // Загрузка услуг для фильтра
    async function loadServices() {
        try {
            const response = await fetch('/master/services-data');
            const services = await response.json();
            const select = document.getElementById('serviceFilter');
            const modalSelect = document.getElementById('serviceId');
            services.forEach(service => {
                const option = document.createElement('option');
                option.value = service.id;
                option.textContent = service.name;
                select.appendChild(option);

                const option2 = document.createElement('option');
                option2.value = service.id;
                option2.textContent = service.name;
                modalSelect.appendChild(option2);
            });
        } catch (error) {
            console.error('Error loading services:', error);
        }
    }

    // Загрузка слотов
    async function loadSlots() {
        const serviceId = document.getElementById('serviceFilter').value;
        const dateFrom = document.getElementById('dateFromFilter').value;
        const dateTo = document.getElementById('dateToFilter').value;
        const masterId = 1; // временно

        let url = `/master/api/slots/all?masterId=${masterId}`;

        if (dateFrom) {
            url += `&dateFrom=${dateFrom}`;
        }
        if (dateTo) {
            url += `&dateTo=${dateTo}`;
        }

        try {
            let slots = await fetch(url).then(r => r.json());

            // Фильтрация по услуге на клиенте
            if (serviceId) {
                slots = slots.filter(slot => slot.serviceId == serviceId);
            }

            displaySlots(slots);
        } catch (error) {
            console.error('Error loading slots:', error);
        }
    }

    // Отображение слотов
    function displaySlots(slots) {
        const container = document.getElementById('slotsList');

        if (slots.length === 0) {
            container.innerHTML = '<div class="alert alert-info">Нет слотов по выбранным критериям</div>';
            return;
        }

        let html = `
        <table class="table">
            <thead>
                <tr>
                    <th>Дата</th>
                    <th>Время</th>
                    <th>Услуга</th>
                    <th>Статус</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody>
        `;

        slots.forEach(slot => {
            const isBooked = slot.isBooked;
            html += `
            <tr class="${isBooked ? 'booked-slot' : ''}">
                <td>${slot.slotDate}</td>
                <td>${slot.startTime} - ${slot.endTime}</td>
                <td>${slot.serviceName || '—'}</td>
                <td>${isBooked ? '<span class="badge bg-secondary">Забронирован</span>' : '<span class="badge bg-success">Свободен</span>'}</td>
                <td>
                    ${!isBooked ? `<button onclick="deleteSlot(${slot.id})" class="btn-delete">Удалить</button>` : '—'}
                </td>
            </tr>
        `;
        });

        // html += `</tbody>}?</table>`;
        container.innerHTML = html;
    }

    // Показать форму добавления слота
    function showAddForm() {
        document.getElementById('slotModal').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('slotModal').style.display = 'none';
        document.getElementById('slotForm').reset();
    }

    window.onclick = function(event) {
        const modal = document.getElementById('slotModal');
        if (event.target == modal) {
            closeModal();
        }
    }

    // Добавление слота
    async function createSlot(event) {
        event.preventDefault();

        const slotDate = document.getElementById('slotDate').value;
        const serviceId = document.getElementById('serviceId').value;
        const startTime = document.getElementById('startTime').value;
        const endTime = document.getElementById('endTime').value;

        // Проверка, что дата не в прошлом
        const today = new Date().toISOString().split('T')[0];
        if (slotDate < today) {
            alert('Нельзя создать слот на прошедшую дату');
            return;
        }

        // Проверка, что время начала раньше времени окончания
        if (startTime >= endTime) {
            alert('Время начала должно быть раньше времени окончания');
            return;
        }

        const slotData = {
            masterId: 1,
            serviceId: parseInt(serviceId),
            slotDate: slotDate,
            startTime: startTime + ':00',
            endTime: endTime + ':00',
            isBooked: false
        };

        try {
            const response = await fetch('/master/api/slots', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(slotData)
            });

            if (response.ok) {
                alert('Слот успешно создан');
                closeModal();
                loadSlots();
            } else {
                const error = await response.text();
                alert('Ошибка при создании слота: ' + error);
            }
        } catch (error) {
            console.error('Error adding slot:', error);
            alert('Ошибка при создании слота');
        }
    }

    // Удаление слота
    async function deleteSlot(slotId) {
        if (!confirm('Удалить этот слот?')) return;

        try {
            const response = await fetch(`/master/api/slots/${slotId}`, {
                method: 'DELETE'
            });

            if (response.ok) {
                alert('Слот удален');
                loadSlots();
            } else {
                alert('Ошибка при удалении слота');
            }
        } catch (error) {
            console.error('Error deleting slot:', error);
            alert('Ошибка при удалении слота');
        }
    }

    // Слушатели изменений фильтров
    document.getElementById('serviceFilter').addEventListener('change', () => loadSlots());
    document.getElementById('dateFromFilter').addEventListener('change', () => loadSlots());
    document.getElementById('dateToFilter').addEventListener('change', () => loadSlots());

    // Инициализация
    document.addEventListener('DOMContentLoaded', function() {
        loadServices();
        loadSlots();
    });
</script>
</body>
</html>
