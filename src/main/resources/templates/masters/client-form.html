<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${client.id} ? 'Редактировать клиента' : 'Добавить клиента'">Клиент - Masterly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f4f4; }
        .header { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .nav { background: #333; overflow: hidden; border-radius: 8px; margin-bottom: 20px; }
        .nav a { float: left; color: white; text-align: center; padding: 14px 16px; text-decoration: none; }
        .nav a:hover { background-color: #ddd; color: black; }
        .content { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logout-form button { padding: 8px 16px; background-color: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .btn-save { background-color: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        .btn-cancel { background-color: #6c757d; color: white; padding: 8px 16px; border-radius: 4px; text-decoration: none; display: inline-block; }
        .logout-form button {
            padding: 8px 16px;
            background-color: #dc3545;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="header">
    <h1>Masterly - Кабинет мастера</h1>
    <form th:action="@{/logout}" method="post" class="logout-form">
        <button type="submit">Выйти</button>
    </form>
</div>

<div class="nav">
    <a href="/">Главная</a>
    <a href="/master/clients">Клиенты</a>
    <a href="/master/services">Услуги</a>
    <a href="/master/materials">Материалы</a>
    <a href="/master/appointments">Записи</a>
    <a href="/master/profile">Профиль</a>
</div>

<div class="content">
    <h2 th:text="${client.id} ? 'Редактировать клиента' : 'Добавить клиента'"></h2>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/master/clients/save}" th:object="${client}" method="post">
        <input type="hidden" th:field="*{id}" />

        <div class="form-group">
            <label for="fullName">ФИО *</label>
            <input type="text" id="fullName" th:field="*{fullName}" required />
        </div>

        <div class="form-group">
            <label for="phone">Телефон *</label>
            <input type="text" id="phone" th:field="*{phone}" placeholder="+375XXXXXXXXX" required />
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" th:field="*{email}" />
        </div>

        <div class="form-group">
            <label for="instagram">Instagram</label>
            <input type="text" id="instagram" th:field="*{instagram}" />
        </div>

        <div class="form-group">
            <label for="telegram">Telegram</label>
            <input type="text" id="telegram" th:field="*{telegram}" />
        </div>

        <div class="form-group">
            <label for="notes">Примечание</label>
            <textarea id="notes" th:field="*{notes}" rows="3"></textarea>
        </div>

        <button type="submit" class="btn-save">Сохранить</button>
        <a href="/master/clients" class="btn-cancel">Отмена</a>
    </form>
</div>
</body>
</html>
