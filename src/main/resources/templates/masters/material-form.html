<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${isEdit} ? 'Редактировать материал' : 'Добавить материал'">Материал - Masterly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f4f4; }
        .header { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .nav { background: #333; overflow: hidden; border-radius: 8px; margin-bottom: 20px; }
        .nav a { float: left; color: white; text-align: center; padding: 14px 16px; text-decoration: none; }
        .nav a:hover { background-color: #ddd; color: black; }
        .content { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logout-form button { padding: 8px 16px; background-color: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .btn-save { background-color: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        .btn-cancel { background-color: #6c757d; color: white; padding: 8px 16px; border-radius: 4px; text-decoration: none; display: inline-block; }
        .logout-form button {
            padding: 8px 16px;
            background-color: #dc3545;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="header">
    <h1>Masterly - Кабинет мастера</h1>
    <form th:action="@{/logout}" method="post" class="logout-form">
        <button type="submit">Выйти</button>
    </form>
</div>

<div class="nav">
    <a href="/">Главная</a>
    <a href="/master/clients">Клиенты</a>
    <a href="/master/services">Услуги</a>
    <a href="/master/materials">Материалы</a>
    <a href="/master/appointments">Записи</a>
    <a href="/master/profile">Профиль</a>
</div>

<div class="content">
    <h2 th:text="${isEdit} ? 'Редактировать материал' : 'Добавить материал'"></h2>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/master/materials/save}" method="post">
        <input type="hidden" th:field="*{material.id}" />

        <div class="form-group">
            <label for="name">Название материала *</label>
            <input type="text" id="name" th:field="*{material.name}" required />
        </div>

        <div class="form-group">
            <label for="unit">Единица измерения *</label>
            <select id="unit" th:field="*{material.unit}" required>
                <option value="шт">шт</option>
                <option value="мл">мл</option>
                <option value="г">г</option>
                <option value="кг">кг</option>
                <option value="л">л</option>
                <option value="уп">уп</option>
            </select>
        </div>

        <div class="form-group">
            <label for="quantity">Количество *</label>
            <input type="number" id="quantity" th:field="*{material.quantity}" required min="0" step="0.01" />
        </div>

        <div class="form-group">
            <label for="minQuantity">Минимальное количество (для уведомлений)</label>
            <input type="number" id="minQuantity" th:field="*{material.minQuantity}" min="0" step="0.01" />
        </div>

        <div class="form-group">
            <label for="pricePerUnit">Цена за единицу (руб) *</label>
            <input type="number" id="pricePerUnit" th:field="*{material.pricePerUnit}" required min="0" step="0.01" />
        </div>

        <div class="form-group">
            <label for="supplier">Поставщик</label>
            <input type="text" id="supplier" th:field="*{material.supplier}" />
        </div>

        <div class="form-group">
            <label for="notes">Примечание</label>
            <textarea id="notes" th:field="*{material.notes}" rows="2"></textarea>
        </div>

        <button type="submit" class="btn-save">Сохранить</button>
        <a href="/master/materials" class="btn-cancel">Отмена</a>
    </form>
</div>
</body>
</html>
