<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${service.id} ? 'Редактировать услугу' : 'Добавить услугу'">Услуга - Masterly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f4f4; }
        .header { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .nav { background: #333; overflow: hidden; border-radius: 8px; margin-bottom: 20px; }
        .nav a { float: left; color: white; text-align: center; padding: 14px 16px; text-decoration: none; }
        .nav a:hover { background-color: #ddd; color: black; }
        .content { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logout-form button { padding: 8px 16px; background-color: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .btn-save { background-color: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        .btn-cancel { background-color: #6c757d; color: white; padding: 8px 16px; border-radius: 4px; text-decoration: none; display: inline-block; }
        .material-row { background: #f8f9fa; padding: 8px; border-radius: 4px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .material-row span { min-width: 150px; }
        .material-row input { width: 100px; }
        .btn-remove-material { background-color: #dc3545; color: white; border: none; border-radius: 4px; padding: 4px 8px; cursor: pointer; }
        .btn-add-material { background-color: #28a745; color: white; border: none; border-radius: 4px; padding: 8px 16px; cursor: pointer; }
        .alert-danger { color: #721c24; background-color: #f8d7da; padding: 10px; border-radius: 4px; margin-bottom: 15px; }
    </style>
</head>
<body>
<div class="header">
    <h1>Masterly - Кабинет мастера</h1>
    <form th:action="@{/logout}" method="post" class="logout-form">
        <button type="submit">Выйти</button>
    </form>
</div>

<div class="nav">
    <a href="/">Главная</a>
    <a href="/master/clients">Клиенты</a>
    <a href="/master/services">Услуги</a>
    <a href="/master/materials">Материалы</a>
    <a href="/master/appointments">Записи</a>
    <a href="/master/profile">Профиль</a>
</div>

<div class="content">

    <div th:if="${allMaterials == null}" class="alert alert-danger">
        ОШИБКА: allMaterials = null
    </div>
    <div th:if="${allMaterials != null}" class="alert alert-success">
        Найдено материалов: <span th:text="${allMaterials.size()}"></span>
    </div>

    <h2 th:text="${service.id} ? 'Редактировать услугу' : 'Добавить услугу'"></h2>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/master/services/save}" th:object="${service}" method="post" onsubmit="collectMaterials()">
        <input type="hidden" th:field="*{id}"/>
        <input type="hidden" id="materialsData" name="materialsData">

        <div class="form-group">
            <label for="name">Название услуги *</label>
            <input type="text" id="name" th:field="*{name}" required/>
        </div>

        <div class="form-group">
            <label for="description">Описание</label>
            <textarea id="description" th:field="*{description}" rows="3"></textarea>
        </div>

        <div class="form-group">
            <label for="durationMinutes">Длительность (минуты) *</label>
            <input type="number" id="durationMinutes" th:field="*{durationMinutes}" required min="5" max="480"/>
        </div>

        <div class="form-group">
            <label for="price">Цена (руб) *</label>
            <input type="number" id="price" th:field="*{price}" required min="0" step="0.01"/>
        </div>

        <div class="form-group">
            <label for="category">Категория</label>
            <input type="text" id="category" th:field="*{category}"/>
        </div>

        <div class="form-group">
            <label for="isActive">Активна</label>
            <select id="isActive" th:field="*{isActive}">
                <option th:value="true">Да</option>
                <option th:value="false">Нет</option>
            </select>
        </div>

        <!-- ========== БЛОК МАТЕРИАЛОВ ========== -->
        <div class="form-group">
            <label>Расход материалов на услугу</label>
            <div id="materials-container">
                <div th:each="mat : ${service.materials}" class="material-row">
                    <input type="hidden" class="material-id" th:value="${mat.materialId}">
                    <span th:text="${mat.materialName}"></span>
                    <input type="number" step="0.01" class="quantity-used" th:value="${mat.quantityUsed}" placeholder="Количество">
                    <button type="button" class="btn-remove-material" onclick="removeMaterialRow(this)">✖ Удалить</button>
                </div>
            </div>

            <div class="mt-2" style="margin-top: 10px;">
                <select id="materialSelect" style="width: 250px; padding: 8px;">
                    <option value="">-- Выберите материал --</option>
                    <option th:each="material : ${allMaterials}" th:value="${material.id}"
                            th:text="${material.name + ' (остаток: ' + material.quantity + ' ' + material.unit + ')'}"></option>
                </select>
                <input type="number" id="materialQuantity" step="0.01" placeholder="Расход" style="width: 100px; padding: 8px;">
                <button type="button" class="btn-add-material" onclick="addMaterial()">+ Добавить материал</button>
            </div>
        </div>

        <button type="submit" class="btn-save">Сохранить</button>
        <a href="/master/services" class="btn-cancel">Отмена</a>
    </form>
</div>

<script th:inline="javascript">
    function addMaterial() {
        const select = document.getElementById('materialSelect');
        const materialId = select.value;
        const materialText = select.options[select.selectedIndex]?.text;
        const materialName = materialText ? materialText.split(' (')[0] : '';
        const quantity = document.getElementById('materialQuantity').value;

        if (!materialId || !quantity) {
            alert('Выберите материал и укажите расход');
            return;
        }

        const container = document.getElementById('materials-container');
        const row = document.createElement('div');
        row.className = 'material-row';
        row.innerHTML = `
            <input type="hidden" class="material-id" value="${materialId}">
            <span>${materialName}</span>
            <input type="number" step="0.01" class="quantity-used" value="${quantity}" placeholder="Количество">
            <button type="button" class="btn-remove-material" onclick="removeMaterialRow(this)">✖ Удалить</button>
        `;
        container.appendChild(row);

        select.value = '';
        document.getElementById('materialQuantity').value = '';
    }

    function removeMaterialRow(button) {
        button.closest('.material-row').remove();
    }

    function collectMaterials() {
        const materials = [];
        document.querySelectorAll('.material-row').forEach(row => {
            const materialId = row.querySelector('.material-id')?.value;
            const quantityUsed = row.querySelector('.quantity-used')?.value;
            if (materialId && quantityUsed) {
                materials.push({
                    materialId: parseInt(materialId),
                    quantityUsed: parseFloat(quantityUsed)
                });
            }
        });
        document.getElementById('materialsData').value = JSON.stringify(materials);
    }
</script>
</body>
</html>
