<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Мои материалы - Masterly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }

        .header {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav {
            background: #333;
            overflow: hidden;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .nav a {
            float: left;
            color: white;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
        }

        .nav a:hover {
            background-color: #ddd;
            color: black;
        }

        .content {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .logout-form button {
            padding: 8px 16px;
            background-color: #dc3545;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-add {
            background-color: #28a745;
            color: white;
            padding: 8px 16px;
            border-radius: 4px;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 15px;
        }

        .btn-edit {
            background-color: #ffc107;
            color: black;
            padding: 4px 8px;
            border-radius: 4px;
            text-decoration: none;
            margin-right: 5px;
        }

        .btn-delete {
            background-color: #dc3545;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            text-decoration: none;
            margin-right: 5px;
        }

        .btn-activate {
            background-color: #28a745;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            text-decoration: none;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .table th, .table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        .table th {
            background-color: #f8f9fa;
        }

        .pagination {
            margin-top: 20px;
        }

        .pagination a {
            padding: 8px 12px;
            text-decoration: none;
            border: 1px solid #ddd;
            margin: 0 2px;
        }

        .pagination .active {
            background-color: #007bff;
            color: white;
            border: 1px solid #007bff;
        }

        .alert-success {
            color: #155724;
            background-color: #d4edda;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        .alert-danger {
            color: #721c24;
            background-color: #f8d7da;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        .alert-info {
            color: #0c5460;
            background-color: #d1ecf1;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        .logout-form button {
            padding: 8px 16px;
            background-color: #dc3545;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .pagination {
            margin-top: 20px;
            display: flex;
            gap: 5px;
            justify-content: center;
        }

        .page-link {
            padding: 8px 12px;
            text-decoration: none;
            border: 1px solid #ddd;
            border-radius: 4px;
            color: #007bff;
        }

        .page-link.active {
            background-color: #007bff;
            color: white;
            border-color: #007bff;
        }

        .page-size-selector {
            margin-top: 15px;
            text-align: right;
        }

        .page-size-selector select {
            margin-left: 10px;
            padding: 5px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
<div class="header">
    <h1>Masterly - Кабинет мастера</h1>
    <form th:action="@{/logout}" method="post" class="logout-form">
        <button type="submit">Выйти</button>
    </form>
</div>


<div class="nav">
    <a href="/">Главная</a>
    <a href="/master/clients">Клиенты</a>
    <a href="/master/services">Услуги</a>
    <a href="/master/materials">Материалы</a>
    <a href="/master/appointments">Записи</a>
    <a href="/master/profile">Профиль</a>
</div>

<div class="content">
    <h2>Мои материалы</h2>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div th:if="${warning}" class="alert alert-warning" th:text="${warning}"></div>
    <a href="/master/materials/new" class="btn-add">+ Добавить материал</a>

    <div th:if="${materials.empty}" class="alert alert-info">
        У вас пока нет материалов. Добавьте первый материал!
    </div>

    <div th:unless="${materials.empty}">
        <table class="table">
            <thead>
            <tr>
                <th>Название</th>
                <th>Ед. изм.</th>
                <th>Количество</th>
                <th>Поставщик</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="material : ${materials}"
                th:class="${material.quantity < 10 ? (material.quantity < 5 ? 'danger-stock' : 'low-stock') : ''}">
                <td th:text="${material.name}">-</td>
                <td th:text="${material.unit}">-</td>
                <td th:text="${material.quantity}">-</td>
                <td th:text="${material.supplier != null ? material.supplier : '-'}">-</td>
                <td>
                    <a th:href="@{/master/materials/edit/{id}(id=${material.id})}" class="btn-edit">Редактировать</a>
                    <a th:href="@{/master/materials/delete/{id}(id=${material.id})}"
                       class="btn-delete"
                       onclick="return confirm('Удалить материал? Это действие нельзя отменить.')">Удалить</a>
                </td>
            </tr>
            </tbody>
        </table>

        <!-- Пагинация -->
        <div th:if="${totalPages >= 1}" class="pagination">
            <a th:href="@{/master/materials(page=0, size=${size})}"
               th:if="${currentPage > 0}" class="page-link">«</a>
            <a th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
               th:href="@{/master/materials(page=${i}, size=${size})}"
               th:text="${i+1}"
               th:class="'page-link ' + (${i == currentPage} ? 'active' : '')"></a>
            <a th:href="@{/master/materials(page=${currentPage+1}, size=${size})}"
               th:if="${currentPage + 1 < totalPages}" class="page-link">»</a>
        </div>

        <div class="page-size-selector">
            <label>Показывать на странице:</label>
            <select id="pageSizeSelect" onchange="changePageSize()">
                <option th:selected="${size == 5}" value="5">5</option>
                <option th:selected="${size == 10}" value="10">10</option>
                <option th:selected="${size == 20}" value="20">20</option>
                <option th:selected="${size == 50}" value="50">50</option>
            </select>
        </div>

        <script>
            function changePageSize() {
                var size = document.getElementById('pageSizeSelect').value;
                window.location.href = '/master/materials?page=0&size=' + size + '&sortBy=' + /*[[${sortBy}]]*/'' + '&sortDir=' + /*[[${sortDir}]]*/'';
            }
        </script>
    </div>
</div>
</body>
</html>
