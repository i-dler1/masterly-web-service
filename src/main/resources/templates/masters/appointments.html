<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Записи - Masterly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }

        .header {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav {
            background: #333;
            overflow: hidden;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .nav a {
            float: left;
            color: white;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
        }

        .nav a:hover {
            background-color: #ddd;
            color: black;
        }

        .content {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .logout-form button {
            padding: 8px 16px;
            background-color: #dc3545;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .table th, .table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        .table th {
            background-color: #f8f9fa;
        }

        .badge {
            padding: 5px 10px;
            border-radius: 4px;
            color: white;
            display: inline-block;
        }

        .bg-success {
            background-color: #28a745;
        }

        .bg-danger {
            background-color: #dc3545;
        }

        .bg-warning {
            background-color: #ffc107;
            color: black;
        }

        .bg-secondary {
            background-color: #6c757d;
        }

        .btn-sm {
            padding: 4px 8px;
            border-radius: 4px;
            text-decoration: none;
            display: inline-block;
            margin-right: 5px;
        }

        .btn-confirm {
            background-color: #28a745;
            color: white;
        }

        .btn-cancel {
            background-color: #dc3545;
            color: white;
        }

        .calendar-container {
            margin-bottom: 30px;
        }

        .fc-daygrid-day.fc-day-has-appointment {
            background-color: #d4edda;
            cursor: pointer;
        }

        .btn-outline-primary.active {
            background-color: #007bff;
            color: white;
        }

        .btn-outline-primary {
            margin-right: 5px;
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            background-color: white;
            min-width: 160px;
            box-shadow: 0px 8px 16px 0px rgba(0, 0, 0, 0.2);
            z-index: 1;
            border-radius: 4px;
            padding: 5px 0;
        }

        .dropdown:hover .dropdown-menu {
            display: block;
        }

        .dropdown-item {
            display: block;
            padding: 8px 16px;
            text-decoration: none;
            color: black;
        }

        .dropdown-item:hover {
            background-color: #f1f1f1;
        }
        .table-secondary {
            background-color: #e9ecef !important;
            opacity: 0.8;
        }
        .pagination {
            margin-top: 20px;
            display: flex;
            gap: 5px;
            justify-content: center;
        }

        .page-link {
            padding: 8px 12px;
            text-decoration: none;
            border: 1px solid #ddd;
            border-radius: 4px;
            color: #007bff;
        }

        .page-link.active {
            background-color: #007bff;
            color: white;
            border-color: #007bff;
        }

        .page-size-selector {
            margin-top: 15px;
            text-align: right;
        }

        .page-size-selector select {
            margin-left: 10px;
            padding: 5px;
            border-radius: 4px;
        }
        .logout-form button {
            padding: 8px 16px;
            background-color: #dc3545;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="header">
    <h1>Masterly - Кабинет мастера</h1>
    <form th:action="@{/logout}" method="post" class="logout-form">
        <button type="submit">Выйти</button>
    </form>
</div>

<div class="nav">
    <a href="/">Главная</a>
    <a href="/master/clients">Клиенты</a>
    <a href="/master/services">Услуги</a>
    <a href="/master/materials">Материалы</a>
    <a href="/master/appointments">Записи</a>
    <a href="/master/profile">Профиль</a>
</div>

<div class="content">
    <h2>Управление записями</h2>
    <div class="mb-3">
        <div class="dropdown d-inline-block">
            <button class="btn btn-primary dropdown-toggle" type="button" id="calendarDropdown"
                    data-bs-toggle="dropdown" aria-expanded="false">
                Календарь записей
            </button>
            <ul class="dropdown-menu" aria-labelledby="calendarDropdown">
                <li><a class="dropdown-item" th:href="@{/master/appointments/calendar(view='week')}">Неделя</a></li>
                <li><a class="dropdown-item" th:href="@{/master/appointments/calendar(view='month')}">Месяц</a></li>
            </ul>
        </div>
        <a href="/master/appointments" class="btn btn-secondary">Список записей</a>
        <a href="/master/slots" class="btn btn-info">Слоты времени</a>
    </div>

    <h3>Все записи</h3>
    <div th:if="${appointments.empty}" class="alert alert-info">
        У вас пока нет записей
    </div>

    <div th:unless="${appointments == null or appointments.empty}">
        <table class="table">
            <thead>
            <tr>
                <th>Дата</th>
                <th>Время</th>
                <th>Клиент</th>
                <th>Услуга</th>
                <th>Статус</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="app : ${appointments}"
                th:class="${app.appointmentDate.isBefore(today)} ? 'table-secondary' : ''">
                <td th:text="${#temporals.format(app.appointmentDate, 'dd.MM.yyyy')}">-</td>
                <td th:text="${app.startTime} + ' - ' + ${app.endTime}">-</td>
                <td th:text="${app.clientName}">-</td>
                <td th:text="${app.serviceName}">-</td>
                <td>
                    <span th:if="${app.appointmentDate.isBefore(today)}" class="badge bg-secondary">Прошла</span>
                    <span th:unless="${app.appointmentDate.isBefore(today)}" class="badge"
                          th:class="${app.status == 'CONFIRMED' ? 'bg-success' :
                                        (app.status == 'CANCELLED' ? 'bg-danger' :
                                        (app.status == 'COMPLETED' ? 'bg-secondary' : 'bg-warning'))}"
                          th:text="${app.status == 'PENDING' ? 'Ожидает' :
                                       (app.status == 'CONFIRMED' ? 'Подтверждена' :
                                       (app.status == 'COMPLETED' ? 'Выполнена' :
                                       (app.status == 'CANCELLED' ? 'Отменена' : app.status)))}">
                        </span>
                </td>
                <td>
                    <form th:if="${app.status == 'PENDING' and !app.appointmentDate.isBefore(today)}"
                          th:action="@{/master/appointments/{id}/confirm(id=${app.id})}"
                          method="post" style="display:inline;">
                        <button type="submit" class="btn-sm btn-confirm" style="border: none; cursor: pointer;">
                            Подтвердить
                        </button>
                    </form>
                    <form th:if="${(app.status == 'PENDING' or app.status == 'CONFIRMED') and !app.appointmentDate.isBefore(today)}"
                          th:action="@{/master/appointments/{id}/cancel(id=${app.id})}"
                          method="post" style="display:inline;">
                        <button type="submit" class="btn-sm btn-cancel" style="border: none; cursor: pointer;">
                            Отменить
                        </button>
                    </form>
                    <span th:if="${app.appointmentDate.isBefore(today)}" style="color: gray;">🔒 Завершена</span>
                </td>
            </tr>
            </tbody>
        </table>
        <div th:if="${totalPages >= 1}" class="pagination">
            <a th:href="@{/master/appointments(page=0, size=${size}, sortBy=${sortBy}, sortDir=${sortDir})}"
               th:if="${currentPage > 0}" class="page-link">«</a>

            <a th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
               th:href="@{/master/appointments(page=${i}, size=${size}, sortBy=${sortBy}, sortDir=${sortDir})}"
               th:text="${i + 1}"
               th:class="'page-link ' + (${i == currentPage} ? 'active' : '')"></a>

            <a th:href="@{/master/appointments(page=${currentPage + 1}, size=${size}, sortBy=${sortBy}, sortDir=${sortDir})}"
               th:if="${currentPage + 1 < totalPages}" class="page-link">»</a>
        </div>

        <div class="page-size-selector">
            <label>Показывать на странице:</label>
            <select id="pageSizeSelect" onchange="changePageSize()">
                <option th:selected="${size == 5}" value="5">5</option>
                <option th:selected="${size == 10}" value="10">10</option>
                <option th:selected="${size == 20}" value="20">20</option>
                <option th:selected="${size == 50}" value="50">50</option>
            </select>
        </div>

        <script>
            function changePageSize() {
                var size = document.getElementById('pageSizeSelect').value;
                window.location.href = '/master/services?page=0&size=' + size + '&sortBy=' + /*[[${sortBy}]]*/'' + '&sortDir=' + /*[[${sortDir}]]*/'';
            }
        </script>
    </div>
</div>

<script>
    const appointments = [[${appointments}]];

    const appointmentsByDate = {};
    appointments.forEach(app => {
        const date = app.appointmentDate;
        if (!appointmentsByDate[date]) {
            appointmentsByDate[date] = [];
        }
        appointmentsByDate[date].push(app);
    });

    document.addEventListener('DOMContentLoaded', function () {
        var calendarEl = document.getElementById('calendar');
        var calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'ru',
            firstDay: 1,
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,timeGridWeek'  // ← кнопки переключения прямо в календаре
            },
            buttonText: {
                today: 'Сегодня',
                month: 'Месяц',
                week: 'Неделя'
            },
            dateClick: function (info) {
                window.location.href = '/master/appointments?date=' + info.dateStr;
            },
            dayCellDidMount: function (info) {
                const dateStr = info.date.toISOString().split('T')[0];
                if (appointmentsByDate[dateStr]) {
                    const count = appointmentsByDate[dateStr].length;
                    info.el.style.backgroundColor = '#d4edda';
                    info.el.style.cursor = 'pointer';

                    const badge = document.createElement('div');
                    badge.style.position = 'absolute';
                    badge.style.top = '2px';
                    badge.style.right = '2px';
                    badge.style.backgroundColor = '#28a745';
                    badge.style.color = 'white';
                    badge.style.borderRadius = '50%';
                    badge.style.width = '20px';
                    badge.style.height = '20px';
                    badge.style.fontSize = '12px';
                    badge.style.display = 'flex';
                    badge.style.alignItems = 'center';
                    badge.style.justifyContent = 'center';
                    badge.innerText = count;
                    info.el.style.position = 'relative';
                    info.el.appendChild(badge);
                }
            }
        });

        calendar.render();
    });
</script>
</body>
</html>
