<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Материалы услуги - Masterly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f4f4; }
        .header { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .nav { background: #333; overflow: hidden; border-radius: 8px; margin-bottom: 20px; }
        .nav a { float: left; color: white; text-align: center; padding: 14px 16px; text-decoration: none; }
        .nav a:hover { background-color: #ddd; color: black; }
        .content { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logout-form button { padding: 8px 16px; background-color: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .table th, .table td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        .table th { background-color: #f8f9fa; }
        .btn-add { background-color: #28a745; color: white; padding: 8px 16px; border-radius: 4px; text-decoration: none; display: inline-block; margin-bottom: 15px; }
        .btn-delete { background-color: #dc3545; color: white; padding: 4px 8px; border-radius: 4px; text-decoration: none; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group select, .form-group input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .btn-save { background-color: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        .btn-cancel { background-color: #6c757d; color: white; padding: 8px 16px; border-radius: 4px; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>
<div class="header">
    <h1>Masterly</h1>
    <form th:action="@{/logout}" method="post" class="logout-form">
        <button type="submit">Выйти</button>
    </form>
</div>

<div class="nav">
    <a href="/">Главная</a>
    <a href="/master/clients">Клиенты</a>
    <a href="/master/services">Услуги</a>
    <a href="/master/materials">Материалы</a>
    <a href="/master/appointments">Записи</a>
    <a href="/master/profile">Профиль</a>
</div>

<div class="content">
    <h2>Материалы услуги: <span th:text="${serviceName}"></span></h2>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <h3>Добавить материал</h3>
    <form id="addMaterialForm" method="post" th:action="@{/master/services/{serviceId}/materials/add(serviceId=${serviceId})}">
        <div class="form-group">
            <label for="materialId">Материал:</label>
            <select id="materialId" name="materialId" required>
                <option value="">Выберите материал</option>
                <option th:each="material : ${allMaterials}" th:value="${material.id}" th:text="${material.name + ' (остаток: ' + material.quantity + ' ' + material.unit + ')'}"></option>
            </select>
        </div>
        <div class="form-group">
            <label for="quantityUsed">Количество (расход на услугу):</label>
            <input type="number" id="quantityUsed" name="quantityUsed" step="0.01" required>
        </div>
        <button type="submit" class="btn-save">Добавить материал</button>
    </form>

    <h3 class="mt-4">Текущие материалы</h3>
    <div th:if="${serviceMaterials.empty}" class="alert alert-info">
        У услуги пока нет материалов
    </div>
    <div th:unless="${serviceMaterials.empty}">
        <table class="table">
            <thead>
            <tr>
                <th>Материал</th>
                <th>Расход</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="sm : ${serviceMaterials}">
                <td th:text="${sm.materialName}">-</td>
                <td th:text="${sm.quantityUsed}">-</td>
                <td>
                    <a th:href="@{/master/services/{serviceId}/materials/{id}/remove(serviceId=${serviceId}, id=${sm.id})}"
                       class="btn-delete"
                       onclick="return confirm('Удалить материал из услуги?')">Удалить</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <a th:href="@{/master/services}" class="btn-cancel mt-3">Назад к услугам</a>
</div>
</body>
</html>
